
[bell]
animation = "EaseOutExpo"


##################################################
# theme options include everything from colors.* #
# just replace the theme color inside this block #
##################################################
[colors.primary]
background = "#222436"
foreground = "#c8d3f5"

[colors.cursor]
cursor = "#c8d3f5"
text = "#222436"

[colors]
draw_bold_text_with_bright_colors = false

[colors.selection]
text = "CellForeground"
background = "#2f334d"

[colors.normal]
black = "#1b1d2b"
red = "#ff757f"
green = "#4fd6be"
yellow = "#ffc777"
blue = "#82aaff"
magenta = "#fca7ea"
cyan = "#86e1fc"
white = "#828bb8"

[colors.bright]
black = "#444a73"
red = "#ff757f"
green = "#4fd6be"
yellow = "#ffc777"
blue = "#82aaff"
magenta = "#fca7ea"
cyan = "#86e1fc"
white = "#c8d3f5"
#################################################
# end of theme colors block			#
#################################################

[cursor]
unfocused_hollow = true
vi_mode_style = "Underline"

[cursor.style]
blinking = "Off"
shape = "Block"

[env]
TERM = "alacritty-direct"

[font]
size = 12

[font.bold]
family = "Hack Nerd Font"
style = "Bold"

[font.bold_italic]
family = "Hack Nerd Font"
style = "Bold Italic"

[font.italic]
family = "Hack Nerd Font"
style = "Italic"

[font.normal]
family = "Hack Nerd Font"
style = "Regular"

[font.offset]
x = 0
y = 1

[terminal.shell]
args = ["-l", "-c", "tmux attach || tmux"]
program = "/bin/zsh"

[window]
decorations = "full"
dynamic_title = true
opacity = 1.0
startup_mode = "Maximized"

[general]
live_config_reload = true

[terminal]
